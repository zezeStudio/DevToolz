      <h1>DevToolz - Global Developer Utilities</h1>
      <p>DevToolz is a comprehensive, privacy-first platform designed to simplify the daily tasks of developers, designers, and IT professionals. Whether you need to format complex JSON data, encode or decode URLs, analyze text and passwords, or compress images for web optimization, our extensive suite of online utilities has you covered.</p>
      <h2>Our Tools</h2>
      <ul>
        <li><a href="/en/json-formatter">JSON Formatter</a>: Organize, beautify, and validate complex JSON data instantly.</li>
        <li><a href="/en/password-generator">Password Generator</a>: Create highly secure and random passwords.</li>
        <li><a href="/en/base64-converter">Base64 Encoder / Decoder</a>: Safely convert plain text data into Base64 format.</li>
        <li><a href="/en/diff-checker">Diff Checker</a>: Compare two pieces of text or code to find exactly what has changed line by line or character by character.</li>
        <li><a href="/en/text-analyzer">Text Analyzer & Word Counter</a>: Accurately calculate the total length, word count, and character count of your text in real-time.</li>
        <li><a href="/en/markdown-editor">Markdown Editor</a>: Real-time Markdown Editor that runs directly in your web browser.</li>
        <li><a href="/en/url-encoder">URL Encoder</a>: Convert special characters in internet addresses into a safe, web-standard format.</li>
        <li><a href="/en/jwt-decoder">JWT Decoder</a>: Inspect and analyze the internal data of encrypted JSON Web Tokens.</li>
        <li><a href="/en/color-converter">Color Converter</a>: Instantly translate between various color formats (HEX, RGB, HSL, CMYK) essential for web design and development.</li>
        <li><a href="/en/uuid-generator">UUID Generator</a>: Create universally unique identifiers for database primary keys or unique tokens.</li>
        <li><a href="/en/hash-generator">Hash Generator</a>: Securely encrypt and verify the integrity of text strings or files using MD5, SHA-256, and more.</li>
        <li><a href="/en/unix-timestamp">Unix Timestamp Converter</a>: Translate Unix timestamps into human-readable dates and times, or vice versa.</li>
        <li><a href="/en/qr-code">QR Code Generator</a>: Instantly convert various types of data into scannable QR codes.</li>
        <li><a href="/en/regex-tester">Regex Tester</a>: Build, test, and debug regular expressions (RegEx) instantly.</li>
        <li><a href="/en/image-compressor">Image Compressor</a>: Optimize website performance by reducing image file sizes using the browser's native Canvas API.</li>
        <li><a href="/en/llm-optimizer">LLM Context Optimizer</a>: Combine multiple code files into a clean token-optimized Markdown format for AI.</li>
        <li><a href="/en/prompt-wrapper">Prompt Wrapper</a>: Structure your AI prompts perfectly using XML tags or Markdown to reduce hallucinations.</li>
        <li><a href="/en/chunking-simulator">Chunking Simulator</a>: Visualize how text is split into chunks for Vector Embeddings (RAG).</li>
        <li><a href="/en/system-prompt">System Prompt Generator</a>: Create rock-solid System Prompts to force Claude, ChatGPT, or Gemini into returning strictly valid JSON.</li>
      </ul>
